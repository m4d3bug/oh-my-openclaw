services:
  # Full-featured instance using official GitHub Container Registry image
  openclaw-full:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: oh-my-openclaw:full
    container_name: omc-full
    environment:
      - OPENCLAW_GATEWAY_PORT=18789
      - OMC_AGENT_MODE=team
      - OMC_MODEL_ROUTER=auto
      - OMC_LOG_LEVEL=info
    volumes:
      - ${WORKSPACE:-$PWD}:/workspace
      - omc-data:/omc/data
    ports:
      - "18789:18789"
    restart: unless-stopped
    profiles: [full]

  # Lightweight Alpine instance (faster startup, smaller footprint)
  openclaw-alpine:
    build:
      context: ..
      dockerfile: docker/Dockerfile.alpine
    image: oh-my-openclaw:alpine
    container_name: omc-alpine
    environment:
      - OPENCLAW_GATEWAY_PORT=18789
      - OMC_AGENT_MODE=autopilot
      - OMC_MODEL_ROUTER=auto
      - OMC_LOG_LEVEL=warn
    volumes:
      - ${WORKSPACE:-$PWD}:/workspace
      - omc-data:/omc/data
    ports:
      - "18789:18789"
    restart: unless-stopped
    profiles: [alpine]

  # Validation-only runner: checks configs/skills via AgentGuard, then exits
  validate:
    build:
      context: ..
      dockerfile: docker/Dockerfile.alpine
    image: oh-my-openclaw:alpine
    container_name: omc-validate
    command: ["node", "/omc/scripts/validate.js", "--all", "--report"]
    volumes:
      - ${SKILLS_DIR:-./skills}:/omc/user-skills:ro
      - ${CONFIG_DIR:-./config}:/omc/user-config:ro
    profiles: [validate]

volumes:
  omc-data:
