version: '3.8'

services:
  openclaw-alpine:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: omc-alpine
    environment:
      - OPENCLAW_GATEWAY_PORT=${OPENCLAW_GATEWAY_PORT:-18789}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:${OPENCLAW_GATEWAY_PORT:-18789}"
    volumes:
      - ${PWD}/skills:/omc/skills:ro
      - ${PWD}/config:/omc/config:ro
      - ${PWD}/agents:/omc/agents:ro
      - ./docker/entrypoint.sh:/omc/docker/entrypoint.sh:ro
    entrypoint: ["bash", "/omc/docker/entrypoint.sh"]
    profiles:
      - alpine

  openclaw-full:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: omc-full
    environment:
      - OPENCLAW_GATEWAY_PORT=${OPENCLAW_GATEWAY_PORT:-18789}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:${OPENCLAW_GATEWAY_PORT:-18789}"
    volumes:
      - ${PWD}/skills:/omc/skills:ro
      - ${PWD}/config:/omc/config:ro
      - ${PWD}/agents:/omc/agents:ro
      - ./docker/entrypoint.sh:/omc/docker/entrypoint.sh:ro
    entrypoint: ["bash", "/omc/docker/entrypoint.sh"]
    profiles:
      - full

  validate:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: omc-validate
    environment:
      - SKILLS_DIR=${SKILLS_DIR:-/omc/skills}
    volumes:
      - ${PWD}:/omc:ro
    entrypoint: ["bash", "-c", "npm install @goplus/agentguard && node /omc/scripts/validate.js --dir ${SKILLS_DIR} --strict"]
    profiles:
      - validate
    working_dir: /omc