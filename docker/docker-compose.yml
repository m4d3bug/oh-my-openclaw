services:
  openclaw-alpine:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: omocw-alpine
    environment:
      - OPENCLAW_GATEWAY_PORT=${OPENCLAW_GATEWAY_PORT:-18789}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:${OPENCLAW_GATEWAY_PORT:-18789}"
    volumes:
      - ${PWD}/skills:/omocw/skills:ro
      - ${PWD}/config:/omocw/config:ro
      - ${PWD}/agents:/omocw/agents:ro
      - ./docker/entrypoint.sh:/omocw/docker/entrypoint.sh:ro
    entrypoint: ["bash", "/omocw/docker/entrypoint.sh"]
    profiles:
      - alpine

  openclaw-full:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: omocw-full
    environment:
      - OPENCLAW_GATEWAY_PORT=${OPENCLAW_GATEWAY_PORT:-18789}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:${OPENCLAW_GATEWAY_PORT:-18789}"
    volumes:
      - ${PWD}/skills:/omocw/skills:ro
      - ${PWD}/config:/omocw/config:ro
      - ${PWD}/agents:/omocw/agents:ro
      - ./docker/entrypoint.sh:/omocw/docker/entrypoint.sh:ro
    entrypoint: ["bash", "/omocw/docker/entrypoint.sh"]
    profiles:
      - full

  validate:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: omocw-validate
    environment:
      - SKILLS_DIR=${SKILLS_DIR:-/omocw/skills}
    volumes:
      - ${PWD}:/omocw:ro
    entrypoint: ["bash", "-c", "npm install @goplus/agentguard && node /omocw/scripts/validate.js --dir ${SKILLS_DIR} --strict"]
    profiles:
      - validate
    working_dir: /omocw

  # Config test runner using official alpine image (no build step)
  test:
    image: alpine/openclaw:latest
    container_name: omocw-test
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-test-key}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://example.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-MiniMax-M2.5}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-000000000:TEST}
    volumes:
      - ${PWD}:/omocw:ro
    command: ["python3", "/omocw/docker/gen-config.py"]
    profiles:
      - test
