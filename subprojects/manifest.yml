# oh-my-openclaw subproject manifest
# Define third-party projects to integrate as subprojects.
#
# Each subproject is cloned into subprojects/<name>/ and its agents/skills/config
# are merged into the oh-my-openclaw runtime at container startup.
#
# Fields:
#   name     — directory name under subprojects/
#   repo     — git clone URL
#   branch   — branch to track (default: main)
#   sparse   — sparse-checkout paths (optional, reduces clone size)
#   agents   — list of agent .md files to import (path relative to subproject root)
#   skills   — list of skill .js files to import
#   config   — config overlay file to merge (optional)
#   enabled  — set to false to skip (default: true)

subprojects:
  - name: OpenMOSS
    repo: https://github.com/uluckyXH/OpenMOSS.git
    branch: main
    sparse:
      - prompts/
      - skills/
    agents:
      - path: prompts/templates/task-planner.md
        as: planner
      - path: prompts/templates/executor.md
        as: executor
      - path: prompts/templates/task-reviewer.md
        as: reviewer
      - path: prompts/templates/task-patrol.md
        as: patrol
    skills: []
    enabled: true

  # Example: add more third-party projects
  # - name: another-project
  #   repo: https://github.com/user/repo.git
  #   branch: main
  #   agents:
  #     - path: agents/custom-agent.md
  #       as: custom
  #   skills:
  #     - path: skills/custom-skill.js
  #       as: custom-skill.js
  #   enabled: false
