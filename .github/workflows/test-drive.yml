name: Test Drive — Telegram

# Manually triggered from GitHub Actions tab.
# Fork this repo → set Secrets → Run workflow → chat on Telegram.
on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'How many minutes to keep the bot alive (5–25)'
        required: false
        default: '15'
        type: choice
        options: ['5', '10', '15', '20', '25']

jobs:
  test-drive:
    name: Boot oh-my-openclaw & connect to Telegram
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node 22 ─────────────────────────────────────────────────────────
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 3. Pull official OpenClaw image ────────────────────────────────────
      - name: Pull OpenClaw image
        run: docker pull ghcr.io/openclaw/openclaw

      # ── 4. Install deps — includes @goplus/agentguard ─────────────────────
      - name: Install npm dependencies (includes @goplus/agentguard)
        run: npm install @goplus/agentguard

      # ── 5. Write runtime openclaw config from secrets ──────────────────────
      - name: Generate runtime config
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENCLAW_GATEWAY_PORT: '18789'
          OMC_AGENT_MODE: ${{ vars.OMC_AGENT_MODE || 'team' }}
          OMC_MODEL_DEFAULT: ${{ vars.OMC_MODEL_DEFAULT || 'claude-sonnet-4-6' }}
        run: |
          cat > config/openclaw.runtime.yml <<ENDYML
          gateway:
            port: ${OPENCLAW_GATEWAY_PORT}
            host: 0.0.0.0

          model:
            provider: anthropic
            api_key: "${ANTHROPIC_API_KEY}"
            base_url: "${ANTHROPIC_BASE_URL}"
            default: ${OMC_MODEL_DEFAULT}
            fast: claude-haiku-4-5-20251001
            smart: claude-sonnet-4-6
            powerful: claude-opus-4-6

          channels:
            - type: telegram
              token: "${TELEGRAM_BOT_TOKEN}"
              # Pre-paired chat — no interactive pairing needed in CI
              chat_id: "${TELEGRAM_CHAT_ID}"
              polling: true

          omc:
            agent_mode: ${OMC_AGENT_MODE}
            routing:
              use_fast_below_tokens: 1000
              use_powerful_above_tokens: 8000

          skills:
            - autopilot
            - team
            - git
            - code
            - notify
          ENDYML
          echo "[omc] Runtime config written (chat_id pre-paired)."

      # ── 7. Start the bot (mount skills/config into official image) ────────
      - name: Start oh-my-openclaw
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          docker run -d \
            --name omc \
            -e ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}" \
            -e ANTHROPIC_BASE_URL="${ANTHROPIC_BASE_URL}" \
            -e TELEGRAM_BOT_TOKEN="${TELEGRAM_BOT_TOKEN}" \
            -e TELEGRAM_CHAT_ID="${TELEGRAM_CHAT_ID}" \
            -e OPENCLAW_GATEWAY_PORT=18789 \
            -v "$PWD/config/openclaw.runtime.yml:/omc/config/openclaw.yml:ro" \
            -v "$PWD/agents:/omc/agents:ro" \
            -v "$PWD/.openclaw:/omc/.openclaw:ro" \
            ghcr.io/openclaw/openclaw \
            openclaw gateway \
              --port 18789 \
              --config /omc/config/openclaw.yml \
              --agent-config /omc/agents/agents.yml

      # ── 9. Wait for startup & print instructions ───────────────────────────
      - name: Wait for bot startup
        run: |
          sleep 6
          docker logs omc
          echo ""
          echo "============================================"
          echo "  Bot is LIVE on Telegram!"
          echo "  Send /autopilot or /team in your chat."
          echo "  Running for ${{ github.event.inputs.duration }} minutes."
          echo "============================================"

      # ── 10. Keep alive ─────────────────────────────────────────────────────
      - name: Keep alive for testing
        run: |
          SECS=$(( ${{ github.event.inputs.duration }} * 60 ))
          STEP=30
          ELAPSED=0
          while [ $ELAPSED -lt $SECS ]; do
            sleep $STEP
            ELAPSED=$(( ELAPSED + STEP ))
            REMAINING=$(( SECS - ELAPSED ))
            echo "[omc] ${ELAPSED}s elapsed — ${REMAINING}s remaining"
            docker inspect omc --format='Status: {{.State.Status}}' 2>/dev/null || true
          done

      # ── 11. Final logs ─────────────────────────────────────────────────────
      - name: Show bot logs
        if: always()
        run: docker logs --tail 100 omc || true

      # ── 12. Cleanup ────────────────────────────────────────────────────────
      - name: Stop & remove container
        if: always()
        run: docker rm -f omc || true
